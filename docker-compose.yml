services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [transcendence]

  api:
    build:
      context: ./apps/api
    environment:
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      EXPOSE_DEV_TOKENS: ${EXPOSE_DEV_TOKENS}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "5555:5555"
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
      - ./data/avatars:/app/data/avatars
    command: sh -lc "npx prisma migrate deploy && npm run db:seed && npm run dev"
    networks: [transcendence]

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE: "/api"
    expose:
      - "5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks: [transcendence]

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./apps/web/public:/usr/share/nginx/html:ro
      - ./data/avatars:/usr/share/nginx/avatars:ro
    networks: [transcendence]

networks:
  transcendence:
    name: transcendence
    driver: bridge

volumes:
  api_node_modules:
  web_node_modules:
  postgres_data: {}