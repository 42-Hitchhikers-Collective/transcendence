services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://app:app@db:5432/appdb"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE: "/api"
    expose:
      - "5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "443:443"
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  db_data:
