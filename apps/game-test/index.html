<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO Game Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .controls {
      width: 300px;
      background: #222;
      padding: 20px;
      overflow-y: auto;
      border-right: 2px solid #444;
    }

    .controls h2 {
      margin-bottom: 20px;
      color: #ffeb3b;
    }

    .control-group {
      margin-bottom: 20px;
      padding: 15px;
      background: #333;
      border-radius: 8px;
    }

    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: bold;
    }

    .control-group input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background: #444;
      border: 1px solid #555;
      color: #fff;
      border-radius: 4px;
    }

    .control-group button {
      width: 100%;
      padding: 10px;
      background: #ffeb3b;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    .control-group button:hover {
      background: #fdd835;
    }

    .control-group button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #game-container {
      flex: 1;
      background: #0a5f0a;
    }

    .status-bar {
      background: #222;
      padding: 15px;
      border-top: 2px solid #444;
      display: flex;
      gap: 20px;
      font-size: 14px;
    }

    .status-item {
      display: flex;
      gap: 8px;
    }

    .status-label {
      color: #888;
      font-weight: bold;
    }

    .status-value {
      color: #ffeb3b;
    }

    .connected {
      color: #4caf50;
    }

    .disconnected {
      color: #f44336;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="controls">
      <h2>🎮 Test Control</h2>

      <div class="control-group">
        <label>JWT Token:</label>
        <input id="tokenInput" type="text" placeholder="Paste JWT token">
        <button onclick="connect()">Connect</button>
      </div>

      <div class="control-group">
        <label>Room Name:</label>
        <input id="roomInput" type="text" placeholder="e.g., TestRoom">
        <button onclick="createRoom()">Create Room</button>
        <button onclick="joinRoom()">Join Room</button>
      </div>

      <div class="control-group">
        <label>Game Control:</label>
        <button onclick="setReady()">Set Ready</button>
        <button onclick="startGame()">Start Game</button>
      </div>

      <div class="control-group">
        <label>Player Action:</label>
        <input id="cardIndexInput" type="number" placeholder="Card index" min="0">
        <button onclick="playCard()">Play Card</button>
        <button onclick="drawCard()">Draw Card</button>
      </div>

      <div class="control-group">
        <label>Debug:</label>
        <button onclick="debugState()">Log State</button>
      </div>
    </div>

    <div class="game-area">
      <div id="game-container"></div>
      <div class="status-bar">
        <div class="status-item">
          <span class="status-label">Status:</span>
          <span id="statusText" class="status-value disconnected">Disconnected</span>
        </div>
        <div class="status-item">
          <span class="status-label">Room:</span>
          <span id="roomText" class="status-value">None</span>
        </div>
        <div class="status-item">
          <span class="status-label">Players:</span>
          <span id="playersText" class="status-value">0</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
