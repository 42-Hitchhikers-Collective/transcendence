<!DOCTYPE html>
<html>
<head>
  <title>Socket Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>

<body>

<h1>Socket.IO Room Test</h1>

<input id="emailInput" placeholder="Email" value="admin@example.com">
<input id="passwordInput" type="password" placeholder="Password" value="ChangeMe123!">
<button onclick="connect()">Connect</button>
<br/><br/>

<button onclick="createRoom()">Create Room</button>
<input id="roomInput" placeholder="Room ID">
<br/>
<button onclick="joinRoom()">Join Room</button>
<button onclick="leaveRoom()">Leave Room</button>
<br/>
<button onclick="startGame()">Start Game</button>
<br/>
<button onclick="debug()">Debug</button>

<script>
let socket = null;

async function connect() {
  const email = document.getElementById("emailInput").value;
  const password = document.getElementById("passwordInput").value;

  const res = await fetch("/api/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password }),
  });

  const { token } = await res.json();

  socket = io("/", {
    path: "/socket.io",
    auth: { token },
  });

  socket.on("connect",       () => console.log("Connected:", socket.id));
  socket.on("connect_error", (e) => console.error("connect_error:", e.message));
  socket.on("room_created",  (data) => console.log("Room created:", data));
  socket.on("room_joined",   (data) => console.log("Joined room:", data));
  socket.on("room_state",    (data) => console.log("Room state:", data));
  socket.on("error",         (data) => console.log("Error:", data));
}

function createRoom() { socket.emit("create_room"); }
function leaveRoom()  { socket.emit("leave_room"); }
function startGame()  { socket.emit("start_game"); }
function debug()      { socket.emit("debug"); }

function joinRoom() {
  const roomId = document.getElementById("roomInput").value;
  socket.emit("join_room", { roomId });
}
</script>

</body>
</html>
