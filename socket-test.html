<!DOCTYPE html>
<html>
<head>
  <title>Socket Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    #chatWindow {
      border: 1px solid #ccc;
      width: 300px;
      height: 400px;
      overflow-y: auto;
      margin-top: 10px;
      padding: 10px;
      background-color: #f9f9f9;
    }
    #roomName {
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h1>Socket.IO Room Test</h1>

<label for="jwtInput">JWT Token:</label>
<input id="jwtInput" placeholder="Enter JWT Token">
<button onclick="connectSocket()">Connect</button>
<br/>

<label for="roomInput"></label>
<input id="roomInput" placeholder="Room Name">
<br />
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>
<button onclick="leaveRoom()">Leave Room</button>
<br/>

<button onclick="startGame()">Start Game</button>

<br/>


<br/>

<div id="chatWindow">
  <div id="roomName">Room: <span id="currentRoom">None</span></div>
  <div id="messages"></div>
</div>

<br />
<label for="msgInput">Message:</label>
<input id="msgInput" placeholder="Enter message">
<button onclick="sendMsg()">Send</button>
<br /><br />
<button onclick="debug()">Debug</button>

<script>
let socket;

function connectSocket() {
  const jwtToken = document.getElementById("jwtInput").value;
  socket = io("http://localhost:3000", {
    path: "/socket.io",
    auth: {
      token: jwtToken
    }
  });

  socket.on("connect", () => {
    console.log("Connected:", socket.id);
  });

  socket.on("room_created", (data) => {
    console.log("Room created:", data);
    document.getElementById("currentRoom").textContent = data.roomName;
    addMessage(`Room '${data.roomName}' created.`);
  });

  socket.on("room_joined", (data) => {
    console.log("Joined room:", data);
    document.getElementById("currentRoom").textContent = data.roomName;
    addMessage(`Joined room '${data.roomName}'.`);
  });

  socket.on("room_state", (data) => {
    console.log("Room state:", data);
    // addMessage(`Room state updated: ${JSON.stringify(data)}`);
  });

  socket.on("error", (data) => {
    console.log("Error:", data);
    addMessage(`Error: ${data.message}`);
  });

  socket.on("chat_message", (data) => {
    console.log(`${data.senderId}: ${data.msg}`);
    addMessage(`${data.senderId}: ${data.msg}`);
  });
}

function createRoom() {
  const roomName = document.getElementById("roomInput").value;
  socket.emit("create_room", { roomName });
}

function leaveRoom() {
  socket.emit("leave_room");
  document.getElementById("currentRoom").textContent = "None";
  addMessage("You left the room.");
}

function startGame() {
  socket.emit("start_game");
}

function debug() {
  socket.emit("debug");
}

function joinRoom() {
  const roomName = document.getElementById("roomInput").value;
  socket.emit("join_room", { roomName });
}

function sendMsg() {
  const msg = document.getElementById("msgInput").value;
  socket.emit("send_msg", { msg });
}

function addMessage(message) {
  const messagesDiv = document.getElementById("messages");
  const messageElement = document.createElement("div");
  messageElement.textContent = message;
  messagesDiv.appendChild(messageElement);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>

</body>
</html>
